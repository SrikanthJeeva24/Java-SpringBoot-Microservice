server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/users/**

        - id: job-service
          uri: lb://JOB-SERVICE
          predicates:
            - Path=/jobs/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka