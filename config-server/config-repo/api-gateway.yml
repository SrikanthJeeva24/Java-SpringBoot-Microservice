server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/auth/**,/api/users/**

            - id: job-service
              uri: lb://JOB-SERVICE
              predicates:
                - Path=/api/jobs/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka